name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ────────────────────────────────────────
  backend-lint:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume_generator_backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
      - run: ruff check .
      - run: ruff format --check .

  backend-test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume_generator_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest
      - run: pytest -v

  # ─── Frontend ───────────────────────────────────────
  frontend-lint:
    name: Frontend Lint (eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume-generator-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: resume-generator-frontend/package-lock.json
      - run: npm install
      - run: npm run lint

  frontend-test:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume-generator-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: resume-generator-frontend/package-lock.json
      - run: npm install
      - run: npm test

  frontend-build:
    name: Frontend Build (vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume-generator-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: resume-generator-frontend/package-lock.json
      - run: npm install
      - run: npm run build
